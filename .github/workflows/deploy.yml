name: Deploy backend

# Build the Docker image, push it to GHCR, then tell the VPS to pull & restart.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'        # docs-only changes don't need a rebuild/redeploy
  workflow_dispatch: {}

env:
  # GHCR requires a lowercase path. Owner "buildingManagement-v1" -> lowercase.
  # If the repo ever moves owners again, update this and docker-compose.prod.yml.
  IMAGE: ghcr.io/buildingmanagement-v1/bm-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # required to push to GHCR
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # built-in, nothing to configure

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Pull & restart on the VPS over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            # Authenticate to GHCR with the run's short-lived token (no PAT to manage).
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /opt/bm-backend
            docker compose pull
            docker compose up -d
            docker image prune -f
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
